<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentimentScope - Real-Time Sentiment Analysis</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(255,255,255,0.8)); }
        }

        .header p { font-size: 1.2rem; opacity: 0.9; }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .input-section {
            display: grid;
            gap: 20px;
        }

        .textarea-container {
            position: relative;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .char-count {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 0.85rem;
            color: #999;
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .secondary-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            box-shadow: none;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sentiment-badge {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 1.3rem;
            font-weight: 700;
            margin: 15px 0;
            text-transform: uppercase;
        }

        .positive { background: #10b981; color: white; }
        .negative { background: #ef4444; color: white; }
        .neutral { background: #6b7280; color: white; }

        .confidence-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            transition: width 1s ease-out;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin: 20px auto;
            border: 5px solid rgba(102, 126, 234, 0.3);
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 30px;
        }

        .examples {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .example-btn {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e0e0e0;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            box-shadow: none;
        }

        .example-btn:hover {
            border-color: #667eea;
            background: white;
            transform: translateY(-2px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            font-weight: 500;
        }

        .emoji-sentiment {
            font-size: 4rem;
            margin: 15px 0;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .results-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Example texts for quick testing
        const exampleTexts = [
            "This product is absolutely amazing! Best purchase ever!",
            "Terrible experience. Would not recommend to anyone.",
            "The weather is nice today.",
            "I love how this app makes my life so much easier!",
            "This is the worst service I've ever encountered. Completely disappointed.",
            "It's okay, nothing special but does the job."
        ];

        function App() {
            const [text, setText] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [result, setResult] = useState(null);
            const [method, setMethod] = useState('transformers');

            const API_URL = 'http://localhost:5000/api';

            const analyzeSentiment = async () => {
                if (!text.trim()) {
                    setError('Please enter some text to analyze');
                    return;
                }

                setLoading(true);
                setError('');
                setResult(null);

                try {
                    const response = await fetch(`${API_URL}/analyze`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ text, method })
                    });

                    const data = await response.json();

                    if (data.success) {
                        setResult(data);
                    } else {
                        setError(data.error || 'Analysis failed');
                    }
                } catch (err) {
                    setError('Failed to connect to API. Make sure the backend is running on port 5000.');
                } finally {
                    setLoading(false);
                }
            };

            const loadExample = (exampleText) => {
                setText(exampleText);
                setResult(null);
                setError('');
            };

            const getSentimentEmoji = (label) => {
                switch(label) {
                    case 'POSITIVE': return '😊';
                    case 'NEGATIVE': return '😞';
                    case 'NEUTRAL': return '😐';
                    default: return '🤔';
                }
            };

            const getSentimentColor = (label) => {
                switch(label) {
                    case 'POSITIVE': return '#10b981';
                    case 'NEGATIVE': return '#ef4444';
                    case 'NEUTRAL': return '#6b7280';
                    default: return '#667eea';
                }
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>🎭 SentimentScope</h1>
                        <p>AI-Powered Real-Time Sentiment Analysis</p>
                    </div>

                    <div className="card">
                        <h2 style={{marginBottom: '20px', color: '#333'}}>Analyze Text Sentiment</h2>
                        
                        <div className="input-section">
                            <div className="textarea-container">
                                <textarea
                                    value={text}
                                    onChange={(e) => setText(e.target.value)}
                                    placeholder="Enter text to analyze sentiment... (e.g., product review, tweet, comment)"
                                    maxLength={1000}
                                />
                                <div className="char-count">{text.length}/1000</div>
                            </div>

                            <div>
                                <label style={{display: 'block', marginBottom: '10px', fontWeight: '600', color: '#333'}}>
                                    Analysis Method
                                </label>
                                <select 
                                    value={method} 
                                    onChange={(e) => setMethod(e.target.value)}
                                    style={{
                                        padding: '12px',
                                        borderRadius: '8px',
                                        border: '2px solid #e0e0e0',
                                        fontSize: '1rem',
                                        width: '100%'
                                    }}
                                >
                                    <option value="transformers">🤖 Transformers (BERT) - More Accurate</option>
                                    <option value="textblob">⚡ TextBlob - Faster</option>
                                </select>
                            </div>

                            <div className="button-group">
                                <button onClick={analyzeSentiment} disabled={loading}>
                                    {loading ? '🔄 Analyzing...' : '🔍 Analyze Sentiment'}
                                </button>
                                <button 
                                    className="secondary-btn" 
                                    onClick={() => {
                                        setText('');
                                        setResult(null);
                                        setError('');
                                    }}
                                >
                                    🗑️ Clear
                                </button>
                            </div>
                        </div>

                        <div>
                            <h3 style={{marginTop: '30px', marginBottom: '15px', color: '#333'}}>
                                📝 Try Quick Examples:
                            </h3>
                            <div className="examples">
                                {exampleTexts.map((example, idx) => (
                                    <button 
                                        key={idx}
                                        className="example-btn"
                                        onClick={() => loadExample(example)}
                                    >
                                        {example.substring(0, 50)}...
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {loading && (
                        <div className="loading">
                            <div className="spinner"></div>
                            <p style={{color: 'white', fontSize: '1.2rem'}}>
                                Analyzing sentiment with AI...
                            </p>
                        </div>
                    )}

                    {error && <div className="error">❌ {error}</div>}

                    {result && (
                        <div className="card">
                            <h2 style={{marginBottom: '30px', color: '#333'}}>📊 Analysis Results</h2>
                            
                            <div className="results-grid">
                                <div className="result-card">
                                    <h3 style={{color: '#666', marginBottom: '10px'}}>Sentiment</h3>
                                    <div className="emoji-sentiment">
                                        {getSentimentEmoji(result.sentiment.label)}
                                    </div>
                                    <div className={`sentiment-badge ${result.sentiment.label.toLowerCase()}`}>
                                        {result.sentiment.label}
                                    </div>
                                </div>

                                <div className="result-card">
                                    <h3 style={{color: '#666', marginBottom: '20px'}}>Confidence Score</h3>
                                    <div className="stat-value">
                                        {(result.sentiment.score * 100).toFixed(1)}%
                                    </div>
                                    <div className="confidence-bar">
                                        <div 
                                            className="confidence-fill" 
                                            style={{
                                                width: `${result.sentiment.score * 100}%`,
                                                background: getSentimentColor(result.sentiment.label)
                                            }}
                                        >
                                            {(result.sentiment.score * 100).toFixed(1)}%
                                        </div>
                                    </div>
                                </div>

                                <div className="result-card">
                                    <h3 style={{color: '#666', marginBottom: '20px'}}>Analysis Method</h3>
                                    <p style={{fontSize: '1.1rem', color: '#333', marginTop: '20px'}}>
                                        {method === 'transformers' ? '🤖 BERT Model' : '⚡ TextBlob'}
                                    </p>
                                    <p style={{fontSize: '0.9rem', color: '#666', marginTop: '10px'}}>
                                        {method === 'transformers' 
                                            ? 'Deep learning based analysis' 
                                            : 'Rule-based analysis'}
                                    </p>
                                </div>
                            </div>

                            <div style={{marginTop: '30px', padding: '20px', background: '#f8f9fa', borderRadius: '12px'}}>
                                <h3 style={{color: '#333', marginBottom: '15px'}}>📝 Analyzed Text:</h3>
                                <p style={{fontSize: '1.05rem', lineHeight: '1.8', color: '#555'}}>
                                    "{result.cleaned_text}"
                                </p>
                            </div>

                            <div style={{marginTop: '20px', textAlign: 'center', color: '#999', fontSize: '0.9rem'}}>
                                🕐 Analyzed at: {new Date(result.timestamp).toLocaleString()}
                            </div>
                        </div>
                    )}

                    <div className="card" style={{background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', color: 'white'}}>
                        <h2 style={{marginBottom: '20px', color: 'white'}}>🚀 About SentimentScope</h2>
                        <p style={{fontSize: '1.1rem', lineHeight: '1.8', marginBottom: '20px'}}>
                            SentimentScope uses state-of-the-art Natural Language Processing (NLP) models to analyze the emotional tone of text. 
                            Perfect for analyzing customer reviews, social media posts, feedback, and more!
                        </p>
                        <div className="stats-grid">
                            <div className="stat-card">
                                <div className="stat-value">🤖</div>
                                <div className="stat-label">AI-Powered</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-value">⚡</div>
                                <div className="stat-label">Real-Time</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-value">🎯</div>
                                <div className="stat-label">Accurate</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
